<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>FIN-TRADER — Briefs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #1f1f1f;
    --text: #e5e5e5;
    --muted: #737373;
    --accent: #22c55e;
    --accent-dim: #166534;
  }
  * { -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, monospace;
    overflow-x: hidden;
  }
  .brief-content { word-wrap: break-word; overflow-wrap: break-word; }
  .brief-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; line-height: 1.3; }
  .brief-content h2 { font-size: 1.15rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: var(--accent); }
  .brief-content h3 { font-size: 0.95rem; font-weight: 600; margin: 0.875rem 0 0.5rem; color: #a3a3a3; }
  .brief-content p { margin: 0.5rem 0; line-height: 1.55; color: #d4d4d4; font-size: 0.9rem; }
  .brief-content ul, .brief-content ol { margin: 0.5rem 0; padding-left: 1.25rem; }
  .brief-content li { margin: 0.25rem 0; font-size: 0.9rem; line-height: 1.5; }
  .brief-content hr { border: 0; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .brief-content strong { color: #ffffff; }
  .brief-content em { color: var(--muted); font-style: italic; }
  .brief-content code { background: #1a1a1a; padding: 0.125rem 0.375rem; border-radius: 3px; font-size: 0.85em; color: #fbbf24; }
  .brief-content pre { background: #0d0d0d; border: 1px solid var(--border); padding: 0.75rem; border-radius: 4px; overflow-x: auto; }
  .brief-content pre code { background: transparent; padding: 0; }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0.75rem 0; border: 1px solid var(--border); border-radius: 4px; }
  .brief-content table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 100%; }
  .brief-content th, .brief-content td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0.5rem 0.6rem; text-align: left; white-space: nowrap; }
  .brief-content th:last-child, .brief-content td:last-child { border-right: 0; }
  .brief-content tr:last-child td { border-bottom: 0; }
  .brief-content th { background: #0d0d0d; color: var(--accent); font-weight: 600; position: sticky; top: 0; }
  .brief-content tr:nth-child(even) td { background: #0c0c0c; }

  .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scroll-thin::-webkit-scrollbar-track { background: var(--panel); }
  .scroll-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .brief-item { transition: background 0.15s ease; }
  .brief-item:active, .brief-item:hover { background: #181818; }
  .brief-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }

  .tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .tag-pre { background: #1e3a8a; color: #93c5fd; }
  .tag-mid { background: #713f12; color: #fde047; }
  .tag-aft { background: #831843; color: #f9a8d4; }
  .tag-close-br { background: #14532d; color: #86efac; }
  .tag-close-us { background: #581c87; color: #d8b4fe; }
  .tag-asia { background: #7f1d1d; color: #fca5a5; }
  .tag-europe { background: #134e4a; color: #5eead4; }
  .tag-wrap { background: #422006; color: #fdba74; font-weight: 700; }
  .tag-other { background: #262626; color: #a3a3a3; }

  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot { animation: pulse-dot 2s ease-in-out infinite; }

  /* Layout: desktop */
  .layout { display: flex; height: calc(100vh - 56px); height: calc(100dvh - 56px); }
  .sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); background: #0d0d0d; overflow-y: auto; }
  .main { flex: 1; overflow-y: auto; min-width: 0; }
  .main-inner { max-width: 56rem; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
  .menu-btn { display: none; }
  .backdrop { display: none; }

  /* Layout: mobile */
  @media (max-width: 768px) {
    .menu-btn {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; color: var(--text);
    }
    .sidebar {
      position: fixed;
      top: 56px; left: 0; bottom: 0;
      width: 84%; max-width: 320px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 30;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .backdrop {
      display: block;
      position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .backdrop.show { opacity: 1; pointer-events: auto; }
    .main-inner { padding: 0.75rem 0.875rem 3rem; max-width: 100%; }
    .brief-content h1 { font-size: 1.2rem; }
    .brief-content h2 { font-size: 1rem; }
    .brief-content h3 { font-size: 0.875rem; }
    .brief-content p, .brief-content li { font-size: 0.85rem; }
    .brief-content table { font-size: 0.72rem; }
    .brief-content th, .brief-content td { padding: 0.375rem 0.5rem; }
    header .subtitle { display: none; }
    .header-meta-update { display: none; }
  }
</style>
</head>
<body>

<header class="border-b border-[#1f1f1f] px-3 sm:px-6 py-3 flex items-center justify-between sticky top-0 bg-[#0a0a0a] z-40" style="height: 56px;">
  <div class="flex items-center gap-2 sm:gap-3 min-w-0">
    <button id="menuBtn" class="menu-btn" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="w-2 h-2 rounded-full bg-green-500 live-dot flex-shrink-0"></div>
    <h1 class="text-base sm:text-lg font-bold tracking-wider truncate">FIN-TRADER</h1>
    <span class="subtitle text-xs text-neutral-500">/ daily briefs</span>
  </div>
  <div class="flex items-center gap-3 text-xs text-neutral-500 flex-shrink-0">
    <span id="lastUpdate" class="header-meta-update hidden sm:inline">Carregando...</span>
    <a href="https://github.com/Mauricio1806/FIN-TRADER" target="_blank" class="hover:text-white transition">repo ↗</a>
  </div>
</header>

<div class="layout">
  <div id="backdrop" class="backdrop"></div>

  <aside id="sidebar" class="sidebar scroll-thin">
    <div class="px-4 py-3 border-b border-[#1f1f1f] flex items-center justify-between sticky top-0 bg-[#0d0d0d] z-10">
      <span class="text-xs text-neutral-500 uppercase tracking-wider">Histórico</span>
      <span id="briefCount" class="text-xs text-neutral-600">—</span>
    </div>
    <div id="briefList" class="divide-y divide-[#161616]">
      <div class="px-4 py-6 text-center text-neutral-600 text-sm">Buscando briefs no repositório...</div>
    </div>
  </aside>

  <main class="main scroll-thin">
    <div class="main-inner">
      <div id="briefContent" class="brief-content">
        <div class="text-neutral-600 text-sm">Selecione um brief no menu.</div>
      </div>
    </div>
  </main>
</div>

<script>
const REPO = 'Mauricio1806/FIN-TRADER';
const REPORTS_PATH = 'reports';
const API_BASE = `https://api.github.com/repos/${REPO}/contents/${REPORTS_PATH}`;
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/main/${REPORTS_PATH}`;

const briefListEl = document.getElementById('briefList');
const briefContentEl = document.getElementById('briefContent');
const briefCountEl = document.getElementById('briefCount');
const lastUpdateEl = document.getElementById('lastUpdate');
const sidebarEl = document.getElementById('sidebar');
const backdropEl = document.getElementById('backdrop');
const menuBtn = document.getElementById('menuBtn');

const cache = new Map();
const isMobile = () => window.innerWidth <= 768;

function openSidebar() { sidebarEl.classList.add('open'); backdropEl.classList.add('show'); }
function closeSidebar() { sidebarEl.classList.remove('open'); backdropEl.classList.remove('show'); }

menuBtn.addEventListener('click', () => {
  if (sidebarEl.classList.contains('open')) closeSidebar(); else openSidebar();
});
backdropEl.addEventListener('click', closeSidebar);

function parseFilename(name) {
  const noExt = name.replace(/\.md$/, '');
  const match = noExt.match(/^(\d{4}-\d{2}-\d{2})[_-]?(\d{4})?[_-]?(.+)?$/);
  if (!match) return { date: noExt, time: null, window: null };
  return {
    date: match[1] || null,
    time: match[2] ? `${match[2].slice(0,2)}:${match[2].slice(2)}` : null,
    window: match[3] || null,
  };
}

function tagForWindow(w) {
  if (!w) return { cls: 'tag-other', label: 'brief' };
  const k = w.toLowerCase();
  if (k.includes('asia')) return { cls: 'tag-asia', label: 'asia close' };
  if (k.includes('europe')) return { cls: 'tag-europe', label: 'europe open' };
  if (k.includes('wrap') || k.includes('daily_wrap')) return { cls: 'tag-wrap', label: 'consolidado' };
  if (k.includes('pre')) return { cls: 'tag-pre', label: 'pre-market' };
  if (k.includes('mid')) return { cls: 'tag-mid', label: 'mid-morning' };
  if (k.includes('aft')) return { cls: 'tag-aft', label: 'afternoon' };
  if (k.includes('close_br') || k.includes('close-br')) return { cls: 'tag-close-br', label: 'close BR' };
  if (k.includes('close_us') || k.includes('close-us')) return { cls: 'tag-close-us', label: 'close US' };
  return { cls: 'tag-other', label: w };
}

function renderList(items) {
  if (!items.length) {
    briefListEl.innerHTML = `<div class="px-4 py-6 text-center text-neutral-600 text-sm">Nenhum brief encontrado em <code>${REPORTS_PATH}/</code>.</div>`;
    briefCountEl.textContent = '0';
    return;
  }
  briefCountEl.textContent = `${items.length} ${items.length === 1 ? 'brief' : 'briefs'}`;
  briefListEl.innerHTML = items.map((item, idx) => {
    const meta = parseFilename(item.name);
    const tag = tagForWindow(meta.window);
    return `
      <div class="brief-item px-4 py-3 cursor-pointer ${idx === 0 ? 'active' : ''}" data-name="${item.name}" data-idx="${idx}">
        <div class="flex items-center justify-between mb-1 gap-2">
          <span class="text-sm font-semibold text-white">${meta.date || item.name}</span>
          <span class="tag ${tag.cls}">${tag.label}</span>
        </div>
        <div class="text-xs text-neutral-500">${meta.time ? meta.time + ' BRT' : ''}</div>
      </div>
    `;
  }).join('');
  document.querySelectorAll('.brief-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.brief-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      loadBrief(el.dataset.name);
      if (isMobile()) closeSidebar();
    });
  });
}

function processTables(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('table').forEach(t => {
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap scroll-thin';
    t.parentNode.insertBefore(wrap, t);
    wrap.appendChild(t);
  });
  return div.innerHTML;
}

async function loadBrief(name) {
  briefContentEl.innerHTML = '<div class="text-neutral-600 text-sm">Carregando brief...</div>';
  if (cache.has(name)) {
    briefContentEl.innerHTML = processTables(marked.parse(cache.get(name)));
    return;
  }
  try {
    const res = await fetch(`${RAW_BASE}/${name}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    cache.set(name, md);
    briefContentEl.innerHTML = processTables(marked.parse(md));
  } catch (e) {
    briefContentEl.innerHTML = `<div class="text-red-400 text-sm">Erro carregando brief: ${e.message}</div>`;
  }
}

async function init() {
  try {
    const res = await fetch(API_BASE);
    if (!res.ok) {
      if (res.status === 404) {
        briefListEl.innerHTML = `<div class="px-4 py-6 text-center text-neutral-600 text-sm">Pasta <code>${REPORTS_PATH}/</code> não encontrada. Aguardando primeira execução.</div>`;
        return;
      }
      throw new Error(`GitHub API: HTTP ${res.status}`);
    }
    const files = await res.json();
    const briefs = files
      .filter(f => f.type === 'file' && f.name.endsWith('.md'))
      .sort((a, b) => b.name.localeCompare(a.name));
    renderList(briefs);
    if (briefs.length > 0) {
      loadBrief(briefs[0].name);
      lastUpdateEl.textContent = `Última atualização: ${new Date().toLocaleString('pt-BR', { timeZone: 'America/Bahia' })}`;
    } else {
      lastUpdateEl.textContent = 'Nenhum brief ainda';
    }
  } catch (e) {
    briefListEl.innerHTML = `<div class="px-4 py-6 text-center text-red-400 text-sm">Erro: ${e.message}</div>`;
    lastUpdateEl.textContent = 'Erro na conexão';
  }
}

init();
setInterval(init, 5 * 60 * 1000);
</script>

</body>
</html>
